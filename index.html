<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conteudo Reserva</title>
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@clappr/hlsjs-playback@latest/dist/hlsjs-playback.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #111; --sidebar-bg: #151515; --purple: #8a2be2; --green: #00ff88; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 10px; }
        aside { width: 320px; background: var(--sidebar-bg); border-right: 1px solid rgba(138,43,226,0.3); display: flex; flex-direction: column; flex-shrink: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        main { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle, #1a1a1a 0%, #111 100%); }
        #player-container { width: 100%; height: 100%; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        #player, .player-wrapper, iframe { width: 100% !important; height: 100% !important; border: none; display: block; }
        .click-shield { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; cursor: pointer; background: rgba(0,0,0,0.01); }
        .brand-container { border-bottom: 1px solid #222; padding: 15px 10px; text-align: center; }
        .nav-header { display: flex; align-items: center; justify-content: space-between; background: linear-gradient(90deg, var(--green), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; font-size: 18px; }
        .nav-btn { -webkit-text-fill-color: var(--green); cursor: pointer; font-size: 24px; padding: 0 10px; }
        .search-box { padding: 15px; }
        .search-box input { width: 90%; background: #000; border: 1px solid #333; padding: 12px; color: var(--green); border-radius: 8px; outline: none; font-family: 'Rajdhani'; }
        .channel-list { overflow-y: auto; flex-grow: 1; }
        .item { padding: 12px 15px; margin: 5px 10px; background: #1a1a1a; border-radius: 8px; display: flex; align-items: center; font-size: 16px; font-weight: 600; cursor: pointer; border-left: 4px solid transparent; user-select: none; transition: 0.2s; }
        .item:hover { background: #222; transform: translateX(5px); }
        .item.active { border-left-color: var(--green); background: rgba(138,43,226,0.15); color: var(--green); }
        .channel-number { min-width: 30px; font-size: 11px; color: var(--purple); margin-right: 12px; background: #000; padding: 2px 6px; border-radius: 4px; text-align: center; }
        .movie-thumb { width: 40px; height: 55px; border-radius: 4px; margin-right: 12px; object-fit: cover; border: 1px solid #333; }
        @media (max-width: 768px) { body { flex-direction: column; } main { order: 1; height: 35vh; width: 100%; padding: 0; } aside { order: 2; width: 100%; height: 65vh; border-right: none; border-top: 2px solid var(--purple); } }
    </style>
</head>
<body>

        <div class="brand-container">
            <div class="nav-header">
                <span class="nav-btn" onclick="toggleMode()">❮</span>

                <span class="nav-btn" onclick="toggleMode()">❯</span>
            </div>
        </div>
        <div class="search-box">
            <input type="text" id="filter" placeholder="🔍 Buscar..." onkeyup="filterList()">
        </div>
        <div class="channel-list" id="contentList"></div>
    </aside>
    <main>
        <div id="player-container" ondblclick="toggleFullScreen()">

        </div>

            {titulo:"60 Minutos",capaUrl:"https://image.tmdb.org/t/p/w400/i5pJ8IoOanVAPBzKi3GiVnGlOld.jpg",videoUrl:"https://fenix7.mazalemp.click/Vod/Filmes2023/Filmes_Novembro/Janeiro/22-01/60.Minutos.(2024).mp4"}
        ];

        filmesRaw.sort((a,b)=>a.titulo.localeCompare(b.titulo));

        // Função para carregar os canais/jogos através do JSON na pasta local
        async function carregarCanaisJSON() {
            try {
                const response = await fetch('jogos.json');
                if (!response.ok) throw new Error('Falha ao carregar o JSON');
                
                canaisRaw = await response.json();
                renderList();
            } catch (error) {
                console.error("Erro ao carregar jogos.json:", error);
                document.getElementById('contentList').innerHTML = `<div class="item" style="color:red; text-align:center; font-size:14px;">Erro ao carregar 'jogos.json'. Verifique se o servidor local está ativo.</div>`;
            }
        }

        function toggleMode(){
            currentMode = (currentMode==='canais') ? 'filmes' : 'canais';
            document.getElementById('current-mode-title').innerText = currentMode.toUpperCase();
            renderList();
        }

        function toggleFullScreen(){
            const c = document.getElementById('player-container');
            if(!document.fullscreenElement) c.requestFullscreen();
            else document.exitFullscreen();
        }

        function renderList(){
            const l = document.getElementById('contentList');
            l.innerHTML = "";
            const d = (currentMode==='canais') ? canaisRaw : filmesRaw;
            
            d.forEach((item,idx) => {
                const div = document.createElement('div');
                div.className = 'item';
                const num = (idx+1).toString().padStart(2,'0');
                
                if(currentMode==='canais'){
                    // Extrai os campos do JSON novo
                    const tituloFormatado = item.confronto ? `[${item.horario}] ${item.confronto}` : "Canal Desconhecido";
                    
                    div.innerHTML = `<span class="channel-number">${num}</span><span>${tituloFormatado}</span>`;
                    div.onclick = () => playCanal(item, div);
                } else {
                    div.innerHTML = `<span class="channel-number">${num}</span><img src="${item.capaUrl}" class="movie-thumb"><span>${item.titulo}</span>`;
                    div.onclick = () => playMovie(item, div);
                }
                
                div.ondblclick = () => toggleFullScreen();
                l.appendChild(div);
            });
        }

        function playCanal(c, el){
            updateActive(el);
            clearPlayer();
            const p = document.getElementById('player');
            
            // Pega o link do vídeo de acordo com o campo "video" do seu novo JSON
            let urlVideo = c.video;

            // Lógica inteligente: se for .m3u8 usa o Clappr, senão (como os .txt do seu JSON) usa Iframe
            if (urlVideo && urlVideo.includes('.m3u8')) {
                currentClappr = new Clappr.Player({
                    source: urlVideo,
                    parentId: "#player",
                    plugins: [HlsjsPlayback],
                    width: '100%',
                    height: '100%',
                    autoPlay: true
                });
            } else if (urlVideo) {
                // Links que terminam em .txt ou embed players padrões rodam via iframe
                p.innerHTML = `<div class="player-wrapper"><div class="click-shield" onclick="this.remove()"></div><iframe src="${urlVideo}" allow="autoplay;fullscreen"></iframe></div>`;
            }
        }

        function playMovie(m, el){
            updateActive(el);
            clearPlayer();
            currentClappr = new Clappr.Player({
                source: m.videoUrl,
                parentId: "#player",
                plugins: [HlsjsPlayback],
                width: '100%',
                height: '100%',
                autoPlay: true
            });
        }

        function clearPlayer(){
            if(currentClappr){
                currentClappr.destroy();
                currentClappr = null;
            }
            document.getElementById('player').innerHTML = "";
        }

        function updateActive(el){
            document.querySelectorAll('.item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            if(window.innerWidth <= 768) window.scrollTo({top:0, behavior:'smooth'});
        }

        function filterList(){
            let v = document.getElementById('filter').value.toLowerCase();
            document.querySelectorAll('.item').forEach(el => {
                el.style.display = el.innerText.toLowerCase().includes(v) ? 'flex' : 'none';
            });
        }

        window.onload = () => {
            // Inicializa buscando o arquivo JSON
            carregarCanaisJSON();
        };
    </script>

</html>
