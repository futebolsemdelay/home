<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canais de TV</title>
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@clappr/hlsjs-playback@latest/dist/hlsjs-playback.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #111; --sidebar-bg: #151515; --purple: #8a2be2; --green: #00ff88; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 10px; }
        aside { width: 320px; background: var(--sidebar-bg); border-right: 1px solid rgba(138,43,226,0.3); display: flex; flex-direction: column; flex-shrink: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        main { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle, #1a1a1a 0%, #111 100%); }
        #player-container { width: 100%; height: 100%; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        #player, .player-wrapper, iframe { width: 100% !important; height: 100% !important; border: none; display: block; }
        .click-shield { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; cursor: pointer; background: rgba(0,0,0,0.01); }
        .brand-container { border-bottom: 1px solid #222; padding: 15px 10px; text-align: center; }
        
        .nav-header { display: flex; align-items: center; justify-content: center; background: linear-gradient(90deg, var(--green), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; font-size: 20px; letter-spacing: 1px; }
        
        .search-box { padding: 15px; }
        .search-box input { width: 90%; background: #000; border: 1px solid #333; padding: 12px; color: var(--green); border-radius: 8px; outline: none; font-family: 'Rajdhani'; }
        
        /* Adicionado padding-bottom para corrigir o corte no mobile */
        .channel-list { overflow-y: auto; flex-grow: 1; padding-bottom: 80px; }
        
        .item { padding: 12px 15px; margin: 5px 10px; background: #1a1a1a; border-radius: 8px; display: flex; align-items: center; font-size: 16px; font-weight: 600; cursor: pointer; border-left: 4px solid transparent; user-select: none; transition: 0.2s; }
        .item:hover { background: #222; transform: translateX(5px); }
        .item.active { border-left-color: var(--green); background: rgba(138,43,226,0.15); color: var(--green); }
        
        .item.offline { 
            background: rgba(255, 0, 0, 0.15); 
            border-left-color: #ff3333; 
            color: #ff9999; 
            opacity: 0.8;
        }
        .item.offline .channel-number {
            background: #4a0000;
            color: #ff3333;
        }

        .channel-number { min-width: 30px; font-size: 11px; color: var(--purple); margin-right: 12px; background: #000; padding: 2px 6px; border-radius: 4px; text-align: center; }
        
        /* Estilo do Botão de Recarregar */
        #btn-reload {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--purple);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            transition: opacity 0.3s ease, transform 0.2s;
            display: none; /* Escondido por padrão */
            opacity: 0;
        }
        #btn-reload:hover { background: var(--green); color: #000; transform: scale(1.05); }

        @media (max-width: 768px) { body { flex-direction: column; } main { order: 1; height: 35vh; width: 100%; padding: 0; } aside { order: 2; width: 100%; height: 65vh; border-right: none; border-top: 2px solid var(--purple); } }
    </style>
</head>
<body>
    <aside>
        <div class="brand-container">
            <div class="nav-header">
                <span>CANAIS DE TV</span>
            </div>
        </div>
        <div class="search-box">
            <input type="text" id="filter" placeholder="🔍 Buscar canal..." onkeyup="filterList()">
        </div>
        <div class="channel-list" id="contentList"></div>
    </aside>
    <main>
        <div id="player-container" ondblclick="toggleFullScreen()">
            <div id="player"></div>
            <button id="btn-reload" onclick="reloadCurrentChannel(event)">🔄 Tentar Novamente</button>
        </div>
    </main>
    <script>
        let currentClappr;
        let canaisRaw = []; 
        let reloadTimeout; // Variável para controlar o timer do botão
        
        // Armazena os dados do canal atual para recarregar
        let canalAtualData = null; 
        let canalAtualElemento = null;

        async function carregarCanaisJSON() {
            try {
                const response = await fetch('jogos.json');
                if (!response.ok) throw new Error('Falha ao carregar o JSON');
                
                canaisRaw = await response.json();
                renderList();
            } catch (error) {
                console.error("Erro ao carregar jogos.json:", error);
                document.getElementById('contentList').innerHTML = `<div class="item" style="color:red; text-align:center; font-size:14px; display:block;">Erro ao carregar 'jogos.json'. Verifique se o servidor local está ativo.</div>`;
            }
        }

        function toggleFullScreen(){
            const c = document.getElementById('player-container');
            if(!document.fullscreenElement) c.requestFullscreen();
            else document.exitFullscreen();
        }

        function renderList(){
            const l = document.getElementById('contentList');
            l.innerHTML = "";
            
            canaisRaw.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'item';
                const num = (idx+1).toString().padStart(2,'0');
                
                const tituloFormatado = item.confronto ? item.confronto : "Canal Desconhecido";
                
                div.innerHTML = `<span class="channel-number">${num}</span><span>${tituloFormatado}</span>`;
                div.onclick = () => playCanal(item, div);
                div.ondblclick = () => toggleFullScreen();
                l.appendChild(div);

                testarLink(item.video, div);
            });
        }

        async function testarLink(url, elementoHtml) {
            if (!url) {
                elementoHtml.classList.add('offline');
                return;
            }

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);

                const response = await fetch(url, { 
                    method: 'GET',
                    signal: controller.signal 
                });
                
                clearTimeout(timeoutId);

                if (!response.ok) {
                    elementoHtml.classList.add('offline');
                }
            } catch (error) {
                elementoHtml.classList.add('offline');
            }
        }

        function playCanal(c, el){
            // Salva as informações do canal atual para o botão "Recarregar"
            canalAtualData = c;
            canalAtualElemento = el;

            updateActive(el);
            clearPlayer();
            
            // Chama a função para exibir o botão temporariamente
            mostrarBotaoRecarregar();

            const p = document.getElementById('player');
            let urlVideo = c.video;

            if (urlVideo && urlVideo.includes('.m3u8')) {
                currentClappr = new Clappr.Player({
                    source: urlVideo,
                    parentId: "#player",
                    plugins: [HlsjsPlayback],
                    width: '100%',
                    height: '100%',
                    autoPlay: true
                });
            } else if (urlVideo) {
                p.innerHTML = `<div class="player-wrapper"><div class="click-shield" onclick="this.remove()"></div><iframe src="${urlVideo}" allow="autoplay;fullscreen"></iframe></div>`;
            }
        }

        function mostrarBotaoRecarregar() {
            const btn = document.getElementById('btn-reload');
            
            // Mostra o botão e define opacidade total
            btn.style.display = 'block';
            setTimeout(() => btn.style.opacity = '1', 10); // pequeno delay para a transição CSS funcionar

            // Limpa qualquer timer anterior para não conflitar
            clearTimeout(reloadTimeout);

            // Define o timer para esconder o botão após 3 segundos (3000 ms)
            reloadTimeout = setTimeout(() => {
                btn.style.opacity = '0';
                // Aguarda a transição de opacidade (0.3s) terminar antes de dar display:none
                setTimeout(() => btn.style.display = 'none', 300); 
            }, 3000);
        }

        function reloadCurrentChannel(event) {
            event.stopPropagation(); // Evita conflito caso clique duplo tente dar fullscreen
            if (canalAtualData && canalAtualElemento) {
                playCanal(canalAtualData, canalAtualElemento);
            }
        }

        function clearPlayer(){
            if(currentClappr){
                currentClappr.destroy();
                currentClappr = null;
            }
            document.getElementById('player').innerHTML = "";
        }

        function updateActive(el){
            document.querySelectorAll('.item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            if(window.innerWidth <= 768) window.scrollTo({top:0, behavior:'smooth'});
        }

        function filterList(){
            let v = document.getElementById('filter').value.toLowerCase();
            document.querySelectorAll('.item').forEach(el => {
                el.style.display = el.innerText.toLowerCase().includes(v) ? 'flex' : 'none';
            });
        }

        window.onload = () => {
            carregarCanaisJSON();
        };
    </script>
</body>
</html>
