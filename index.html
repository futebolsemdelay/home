<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canais de TV</title>
    
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@clappr/hlsjs-playback@latest/dist/hlsjs-playback.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #111; --sidebar-bg: #151515; --purple: #8a2be2; --green: #00ff88; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 10px; }
        
        aside { width: 320px; background: var(--sidebar-bg); border-right: 1px solid rgba(138,43,226,0.3); display: flex; flex-direction: column; flex-shrink: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        main { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle, #1a1a1a 0%, #111 100%); }
        
        #player-container { width: 100%; height: 100%; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        #player, .player-wrapper, iframe { width: 100% !important; height: 100% !important; border: none; display: block; }
        .click-shield { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; cursor: pointer; background: rgba(0,0,0,0.01); }
        #player div[data-player], 
        #player div[data-player] > div {
        width: 100% !important;
        height: 100% !important;
        }

        #player-container iframe {
        width: 100% !important;
        height: 100% !important;
        }
        .brand-container { border-bottom: 1px solid #222; padding: 15px 10px; text-align: center; }
        .nav-header { display: flex; align-items: center; justify-content: center; background: linear-gradient(90deg, var(--green), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; font-size: 20px; letter-spacing: 1px; }
        .search-box { padding: 15px; }
        .search-box input { width: 90%; background: #000; border: 1px solid #333; padding: 12px; color: var(--green); border-radius: 8px; outline: none; font-family: 'Rajdhani'; }
        .channel-list { overflow-y: auto; flex-grow: 1; }
        
        .item { padding: 12px 15px; margin: 5px 10px; background: #1a1a1a; border-radius: 8px; display: flex; align-items: center; font-size: 16px; font-weight: 600; cursor: pointer; border-left: 4px solid transparent; user-select: none; transition: 0.2s; }
        .item:hover { background: #222; transform: translateX(5px); }
        .item.active { border-left-color: var(--green); background: rgba(138,43,226,0.15); color: var(--green); }
        .channel-number { min-width: 30px; font-size: 11px; color: var(--purple); margin-right: 12px; background: #000; padding: 2px 6px; border-radius: 4px; text-align: center; }
        
        #smart-buffer-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; color: #fff; font-family: 'Rajdhani', sans-serif; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(138,43,226,0.3); border-top-color: var(--green); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .progress-text { font-size: 24px; font-weight: bold; color: var(--green); letter-spacing: 1px; }

        #custom-progress-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 5px; background: rgba(0, 0, 0, 0.5); z-index: 1000; display: none; transition: height 0.2s ease; }
        #player-container:hover #custom-progress-bar { height: 12px; }
        #bar-buffered { position: absolute; top: 0; left: 0; height: 100%; background: rgba(255, 255, 255, 0.4); width: 0%; transition: width 0.3s linear; }
        #bar-played { position: absolute; top: 0; left: 0; height: 100%; background: var(--green); width: 0%; box-shadow: 0 0 10px var(--green); transition: width 0.3s linear; }
        
        /* Novos estilos para tempo */
        #time-display { position: absolute; top: 4px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 14px; color:#312a2a; font-family: monospace; z-index: 1001; pointer-events: none; display: none; }

        @media (max-width: 768px) { .channel-list { margin-bottom: 60px; } body { flex-direction: column; } main { order: 1; height: 35vh; width: 100%; padding: 0; } aside { order: 2; width: 100%; height: 65vh; border-right: none; border-top: 2px solid var(--purple); } }
    </style>
</head>
<body>
    <aside>
        <div class="brand-container"><div class="nav-header"><span>CANAIS DE TV</span></div></div>
        <div class="search-box"><input type="text" id="filter" placeholder="🔍 Buscar canal..." onkeyup="filterList()"></div>
        <div class="channel-list" id="contentList"></div>
    </aside>
    
    <main>
        <div id="player-container" ondblclick="toggleFullScreen()">
            <div id="smart-buffer-overlay">
                <div class="spinner"></div>
                <div class="progress-text" id="overlay-text">Carregando 0%</div>
            </div>
            
            <div id="custom-progress-bar">
                <div id="bar-buffered"></div>
                <div id="bar-played"></div>
            </div>

            <div id="time-display">
                <span id="txt-atual">00:00</span>
                <span id="txt-baixado">00:00</span>
            </div>
            
            <div id="player"></div>
        </div>
    </main>

    <script>
        let currentClappr;
        let canaisRaw = [];
        let isSmartBuffering = false;
        let objBufferTarget = 30; 
        
        function formatTime(s) {
            let m = Math.floor(s / 60);
            let sec = Math.floor(s % 60);
            return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        async function carregarCanaisJSON() {
            try {
                const response = await fetch('jogos.json');
                if (!response.ok) throw new Error('Falha');
                canaisRaw = await response.json();
                renderList();
            } catch (error) { document.getElementById('contentList').innerHTML = `<div class="item" style="color:red; text-align:center;">Erro JSON.</div>`; }
        }

        function toggleFullScreen(){
            const c = document.getElementById('player-container');
            if(!document.fullscreenElement) c.requestFullscreen();
            else document.exitFullscreen();
        }

        function renderList(){
            const l = document.getElementById('contentList');
            canaisRaw.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<span class="channel-number">${(idx+1).toString().padStart(2,'0')}</span><span>${item.confronto || "Canal"}</span>`;
                div.onclick = () => playCanal(item, div);
                l.appendChild(div);
            });
        }

        function playCanal(c, el){
            document.querySelectorAll('.item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            clearPlayer();
            const p = document.getElementById('player');
            let urlVideo = c.video;

            if (urlVideo && (urlVideo.includes('.m3u8') || urlVideo.includes('.txt'))) {
                isSmartBuffering = true;
                currentClappr = new Clappr.Player({
                    source: urlVideo.includes('.txt') ? urlVideo + '?.m3u8' : urlVideo, 
                    mimeType: 'application/vnd.apple.mpegurl', 
                    parentId: "#player",
                    plugins: [HlsjsPlayback],
                    autoPlay: true, 
                    playback: {
                        hlsjsConfig: {
                            maxBufferLength: 45, maxMaxBufferLength: 60, maxBufferSize: 60 * 1000 * 1000, 
                            liveSyncDuration: 30, liveMaxLatencyDuration: 120, lowLatencyMode: false 
                        }
                    }
                });
            } else {
                isSmartBuffering = false;
                p.innerHTML = `<div class="player-wrapper"><div class="click-shield" onclick="this.remove()"></div><iframe src="${urlVideo}" allow="autoplay;fullscreen"></iframe></div>`;
            }
        }

        function clearPlayer(){
            if(currentClappr){ currentClappr.destroy(); currentClappr = null; }
            document.getElementById('smart-buffer-overlay').style.display = "none";
            document.getElementById('custom-progress-bar').style.display = "none";
            document.getElementById('time-display').style.display = "none";
            isSmartBuffering = false;
        }

        setInterval(() => {
            const video = document.querySelector('video');
            const overlay = document.getElementById('smart-buffer-overlay');
            const progressBar = document.getElementById('custom-progress-bar');
            
            if (video && currentClappr) {
                let atual = video.currentTime;
                let baixado = (video.buffered.length > 0) ? video.buffered.end(video.buffered.length - 1) : 0;
                
                document.getElementById('txt-atual').innerText = formatTime(atual);
                document.getElementById('txt-baixado').innerText = formatTime(baixado);
                document.getElementById('time-display').style.display = "flex";

                if (isSmartBuffering) {
                    overlay.style.display = "flex";
                    let folga = (baixado - atual);
                    let percent = Math.min(100, Math.round((folga / objBufferTarget) * 100));
                    document.getElementById('overlay-text').innerText = `Carregando ${percent}%`;
                    if (folga >= objBufferTarget || (baixado > 0 && folga > 20 && video.readyState === 4)) {
                        isSmartBuffering = false; overlay.style.display = "none"; video.play(); 
                    }
                }

                progressBar.style.display = "block";
                let duracao = video.duration;
                if (duracao && duracao !== Infinity) {
                    document.getElementById('bar-buffered').style.width = (baixado / duracao * 100) + "%";
                    document.getElementById('bar-played').style.width = (atual / duracao * 100) + "%";
                }
            }
        }, 500);

        window.onload = carregarCanaisJSON;
    </script>
</body>
</html>
