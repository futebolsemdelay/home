<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canais de TV</title>
    
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@clappr/hlsjs-playback@latest/dist/hlsjs-playback.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #111; --sidebar-bg: #151515; --purple: #8a2be2; --green: #00ff88; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 10px; }
        
        aside { width: 320px; background: var(--sidebar-bg); border-right: 1px solid rgba(138,43,226,0.3); display: flex; flex-direction: column; flex-shrink: 0; }
        main { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle, #1a1a1a 0%, #111 100%); position: relative; }
        
        #player-container { width: 100%; height: 100%; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
        #player { width: 100%; height: 100%; }
        
        /* Menu e Listagem */
        .brand-container { border-bottom: 1px solid #222; padding: 15px 10px; text-align: center; }
        .nav-header { background: linear-gradient(90deg, var(--green), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; font-size: 20px; }
        .channel-list { overflow-y: auto; flex-grow: 1; }
        .item { padding: 12px 15px; margin: 5px 10px; background: #1a1a1a; border-radius: 8px; cursor: pointer; display: flex; align-items: center; }
        .item.active { border-left: 4px solid var(--green); background: rgba(138,43,226,0.15); color: var(--green); }

        /* Barra de Progresso e Tempos */
        #custom-progress-bar { position: absolute; bottom: 30px; left: 0; width: 100%; height: 8px; background: rgba(0,0,0,0.5); z-index: 1000; }
        #bar-buffered { position: absolute; top: 0; left: 0; height: 100%; background: rgba(255, 255, 255, 0.3); width: 0%; }
        #bar-played { position: absolute; top: 0; left: 0; height: 100%; background: var(--green); width: 0%; box-shadow: 0 0 10px var(--green); }
        
        #time-display { position: absolute; bottom: 5px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 13px; color: #fff; z-index: 1001; font-family: monospace; }
        
        #smart-buffer-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--purple); border-top-color: var(--green); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) { body { flex-direction: column; } main { height: 35vh; } aside { height: 65vh; } }
    </style>
</head>
<body>
    <aside>
        <div class="brand-container"><div class="nav-header">CANAIS DE TV</div></div>
        <div class="channel-list" id="contentList"></div>
    </aside>
    
    <main>
        <div id="player-container">
            <div id="smart-buffer-overlay">
                <div class="spinner"></div>
                <div style="margin-top:10px; color:var(--green);" id="overlay-text">Carregando...</div>
            </div>
            
            <div id="player"></div>
            
            <div id="custom-progress-bar">
                <div id="bar-buffered"></div>
                <div id="bar-played"></div>
            </div>
            <div id="time-display">
                <span id="txt-atual">00:00</span>
                <span id="txt-baixado">00:00</span>
            </div>
        </div>
    </main>

    <script>
        let currentClappr;
        let isSmartBuffering = false;

        function formatTime(s) {
            if (!s || isNaN(s)) return "00:00";
            let m = Math.floor(s / 60);
            let sec = Math.floor(s % 60);
            return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        async function carregarCanaisJSON() {
            try {
                const res = await fetch('jogos.json');
                const data = await res.json();
                const l = document.getElementById('contentList');
                data.forEach((item, idx) => {
                    const div = document.createElement('div');
                    div.className = 'item';
                    div.innerHTML = `<span>${item.confronto}</span>`;
                    div.onclick = () => {
                        document.querySelectorAll('.item').forEach(i => i.classList.remove('active'));
                        div.classList.add('active');
                        playCanal(item);
                    };
                    l.appendChild(div);
                });
            } catch (e) { console.error(e); }
        }

        function playCanal(c) {
            if(currentClappr) currentClappr.destroy();
            currentClappr = new Clappr.Player({
                source: c.video,
                parentId: "#player",
                plugins: [HlsjsPlayback],
                autoPlay: true,
                playback: { hlsjsConfig: { maxBufferLength: 45 } }
            });
        }

        setInterval(() => {
            const video = document.querySelector('video');
            if (video) {
                let atual = video.currentTime;
                let baixado = (video.buffered.length > 0) ? video.buffered.end(video.buffered.length - 1) : 0;
                let duracao = video.duration;

                document.getElementById('txt-atual').innerText = formatTime(atual);
                document.getElementById('txt-baixado').innerText = formatTime(baixado);

                if (duracao && duracao !== Infinity) {
                    document.getElementById('bar-buffered').style.width = (baixado / duracao * 100) + "%";
                    document.getElementById('bar-played').style.width = (atual / duracao * 100) + "%";
                }
            }
        }, 500);

        window.onload = carregarCanaisJSON;
    </script>
</body>
</html>
