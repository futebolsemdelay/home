<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canais de TV</title>
    
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@clappr/hlsjs-playback@latest/dist/hlsjs-playback.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #111; --sidebar-bg: #151515; --purple: #8a2be2; --green: #00ff88; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 10px; }
        
        aside { width: 320px; background: var(--sidebar-bg); border-right: 1px solid rgba(138,43,226,0.3); display: flex; flex-direction: column; flex-shrink: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        main { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle, #1a1a1a 0%, #111 100%); }
        
        #player-container { width: 100%; height: 100%; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        #player, .player-wrapper, iframe { width: 100% !important; height: 100% !important; border: none; display: block; }

        /* Estilo de Categorias */
        .category-container { padding: 5px 10px; display: flex; flex-wrap: wrap; gap: 5px; border-bottom: 1px solid #222; }
        .cat-btn { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-family: 'Rajdhani'; font-size: 12px; }
        .cat-btn.active { border-color: var(--green); color: var(--green); }

        .brand-container { border-bottom: 1px solid #222; padding: 15px 10px; text-align: center; }
        .nav-header { display: flex; align-items: center; justify-content: center; background: linear-gradient(90deg, var(--green), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; font-size: 20px; letter-spacing: 1px; }
        .search-box { padding: 15px; }
        .search-box input { width: 90%; background: #000; border: 1px solid #333; padding: 12px; color: var(--green); border-radius: 8px; outline: none; font-family: 'Rajdhani'; }
        .channel-list { overflow-y: auto; flex-grow: 1; }
        
        .item { padding: 12px 15px; margin: 5px 10px; background: #1a1a1a; border-radius: 8px; display: flex; align-items: center; font-size: 16px; font-weight: 600; cursor: pointer; border-left: 4px solid transparent; user-select: none; transition: 0.2s; }
        .item:hover { background: #222; transform: translateX(5px); }
        .item.active { border-left-color: var(--green); background: rgba(138,43,226,0.15); color: var(--green); }
        .channel-number { min-width: 30px; font-size: 11px; color: var(--purple); margin-right: 12px; background: #000; padding: 2px 6px; border-radius: 4px; text-align: center; }
        
        #smart-buffer-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(138,43,226,0.3); border-top-color: var(--green); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #custom-progress-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 1px; background: rgba(0, 0, 0, 0.5); z-index: 1000; }
        #bar-played { background: var(--green); height: 100%; width: 0%; box-shadow: 0 0 10px var(--green); }
    </style>
</head>
<body>
    <aside>
        <div class="brand-container"><div class="nav-header">CANAIS DE TV</div></div>
        <div class="search-box"><input type="text" id="filter" placeholder="🔍 Buscar canal..." onkeyup="renderList()"></div>
        <div class="category-container" id="catList"></div>
        <div class="channel-list" id="contentList"></div>
    </aside>
    
    <main>
        <div id="player-container" ondblclick="toggleFullScreen()">
            <div id="smart-buffer-overlay"><div class="spinner"></div><div id="overlay-text">Carregando...</div></div>
            <div id="custom-progress-bar"><div id="bar-played"></div></div>
            <div id="player"></div>
        </div>
    </main>

    <script>
        let currentClappr, canaisRaw = [], catAtual = "Todos", isSmartBuffering = false;

        async function carregarCanaisJSON() {
            try {
                const res = await fetch('imagens.json');
                canaisRaw = await res.json();
                renderCats();
                renderList();
            } catch (e) { document.getElementById('contentList').innerHTML = "Erro ao carregar."; }
        }

        function renderCats() {
            const container = document.getElementById('catList');
            const cats = ["Todos", ...new Set(canaisRaw.flatMap(c => c.categorias))];
            cats.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'cat-btn' + (cat === "Todos" ? ' active' : '');
                btn.innerText = cat;
                btn.onclick = () => {
                    catAtual = cat;
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderList();
                };
                container.appendChild(btn);
            });
        }

        function renderList() {
            const l = document.getElementById('contentList'), termo = document.getElementById('filter').value.toLowerCase();
            l.innerHTML = "";
            canaisRaw.forEach((item, idx) => {
                if ((catAtual === "Todos" || item.categorias.includes(catAtual)) && item.canal.toLowerCase().includes(termo)) {
                    const div = document.createElement('div');
                    div.className = 'item';
                    div.innerHTML = `<span class="channel-number">${(idx+1).toString().padStart(2,'0')}</span><span>${item.canal}</span>`;
                    div.onclick = () => playCanal(item, div);
                    l.appendChild(div);
                }
            });
        }

        function playCanal(c, el) {
            document.querySelectorAll('.item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            if(currentClappr) currentClappr.destroy();
            
            isSmartBuffering = true;
            document.getElementById('smart-buffer-overlay').style.display = "flex";

            currentClappr = new Clappr.Player({
                source: c.qualidade === "hd" ? c.logo + "/file.txt?m3u8" : c.logo,
                parentId: "#player",
                plugins: [HlsjsPlayback],
                autoPlay: true,
                playback: { hlsjsConfig: { maxBufferLength: 45 } }
            });
        }

        function toggleFullScreen(){
            const c = document.getElementById('player-container');
            !document.fullscreenElement ? c.requestFullscreen() : document.exitFullscreen();
        }

        setInterval(() => {
            const video = document.querySelector('video');
            if (video && currentClappr) {
                document.getElementById('bar-played').style.width = (video.currentTime / video.duration * 100) + "%";
                if (isSmartBuffering && video.readyState === 4) {
                    isSmartBuffering = false;
                    document.getElementById('smart-buffer-overlay').style.display = "none";
                }
            }
        }, 500);

        window.onload = carregarCanaisJSON;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/disable-devtool@latest/disable-devtool.min.js"></script>
    <script>
        DisableDevtool({ md5: '8865f3a072045558837311100572d427', url: 'bloqueado.html', disableMenu: true, disableSelect: true });
    </script>
</body>
</html>
