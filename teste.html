<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Portal de Canais</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #1a1a1a; font-family: sans-serif; }
        
        /* Menu lateral */
        #menu { width: 250px; background: #222; padding: 15px; border-right: 2px solid #444; }
        .btn-canal { display: block; width: 100%; padding: 12px; margin-bottom: 10px; background: #333; color: white; border: none; cursor: pointer; text-align: left; border-radius: 4px; }
        .btn-canal:hover { background: #444; }
        
        /* Área do player */
        #player-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="menu">
        <h3 style="color:white">Canais</h3>
        <button class="btn-canal" onclick="trocarCanal('https://ww4.embedtv.lat/caze1')">Cazé TV</button>
        <button class="btn-canal" onclick="trocarCanal('https://ww4.embedtv.lat/premiere')">Premiere</button>
        <button class="btn-canal" onclick="trocarCanal('https://ww4.embedtv.lat/pt_abola')">A Bola</button>
    </div>

    <div id="player-area">
        <iframe id="iframePlayer" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>

    <script>
        const workerBase = "https://delicate-feather-5576.futebolsemdelay.workers.dev/?url=";

        function trocarCanal(urlOriginal) {
            const iframe = document.getElementById('iframePlayer');
            iframe.src = workerBase + encodeURIComponent(urlOriginal);
        }

        // Abre o primeiro canal automaticamente ao carregar a página
        window.onload = () => trocarCanal('https://ww4.embedtv.lat/caze1');
    </script>
</body>
</html>
