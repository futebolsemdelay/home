<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Auditor de Canais Pro</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 900px; margin: auto; }
        .resumo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .card { padding: 10px; background: #eee; border-radius: 5px; text-align: center; }
        .erro-linha { color: #d32f2f; padding: 5px; border-bottom: 1px solid #ddd; font-size: 0.9em; }
        .btn-simular { background: #007bff; color: white; padding: 10px; border: none; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div class="box">
    <h1>Auditoria de Canais</h1>
    
    <div id="resumo" class="resumo-grid">Processando dados...</div>
    
    <div id="listaErros">
        <h3>❌ Canais OFF (Lista para Auditoria)</h3>
        <div id="conteudoErros"></div>
    </div>
</div>

<script>
async function iniciarAuditoria() {
    const conteudoErros = document.getElementById('conteudoErros');
    const resumoDiv = document.getElementById('resumo');
    
    let stats = { total: 0, ok: 0, erro: 0, dominios: {} };
    let listaOff = [];

    try {
        const res = await fetch('imagens.json');
        const canais = await res.json();
        stats.total = canais.length;

        for (const item of canais) {
            const urlFinal = item.qualidade === 'hd' ? item.logo + '/file.txt' : item.logo + '.m3u8';
            const dom = new URL(item.logo).hostname;

            try {
                const check = await fetch(urlFinal, { method: 'HEAD', mode: 'cors' });
                if (check.ok) {
                    stats.ok++;
                } else {
                    throw new Error(check.status);
                }
            } catch (err) {
                stats.erro++;
                stats.dominios[dom] = (stats.dominios[dom] || 0) + 1;
                
                listaOff.push({ canal: item.canal, url: urlFinal, dominio: dom });
                conteudoErros.innerHTML += `<div class="erro-linha">
                    ❌ <b>${item.canal}</b> | Domínio: ${dom} | URL: <a href="${urlFinal}" target="_blank">${urlFinal}</a>
                </div>`;
            }
        }

        // Renderiza Resumo
        resumoDiv.innerHTML = `
            <div class="card">Total: ${stats.total}</div>
            <div class="card" style="color:green">OK: ${stats.ok}</div>
            <div class="card" style="color:red">OFF: ${stats.erro}</div>
        `;

        // Mostra resumo de domínios
        let domHtml = "<h3>Erros por Domínio:</h3><ul>";
        for (let d in stats.dominios) domHtml += `<li><b>${d}</b>: ${stats.dominios[d]} erros</li>`;
        resumoDiv.innerHTML += domHtml + "</ul>";

    } catch (e) {
        conteudoErros.innerHTML = "Erro fatal: " + e.message;
    }
}

iniciarAuditoria();
</script>
</body>
</html>
