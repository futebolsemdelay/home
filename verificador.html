<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Auditoria Detalhada de Canais</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 900px; margin: auto; }
        .resumo { background: #e8f4fd; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        .erro { color: #d32f2f; font-weight: bold; margin: 3px 0; border-bottom: 1px solid #eee; }
        .ok { color: #388e3c; margin: 3px 0; border-bottom: 1px solid #eee; }
        .count-box { display: inline-block; margin-right: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h1>Auditoria de Canais</h1>
    <div id="resumo" class="resumo">Processando contagem...</div>
    
    <h2>✅ Canais OK</h2>
    <div id="listaOk"></div>
    
    <h2>❌ Canais com Problemas</h2>
    <div id="listaErros"></div>
</div>

<script>
async function rodarAuditoria() {
    const listaOk = document.getElementById('listaOk');
    const listaErros = document.getElementById('listaErros');
    const resumoDiv = document.getElementById('resumo');
    
    let contagem = { ok: 0, erro: 0, dominiosErro: {} };

    try {
        const resposta = await fetch('imagens.json');
        const canais = await resposta.json();

        for (const item of canais) {
            const urlFinal = item.qualidade === 'hd' ? item.logo + '/file.txt' : item.logo + '.m3u8';
            
            // Extrai o domínio da URL para o relatório
            const dominio = new URL(item.logo).hostname;

            try {
                const res = await fetch(urlFinal, { method: 'HEAD', mode: 'cors' });

                if (res.ok) {
                    contagem.ok++;
                    listaOk.innerHTML += `<div class="ok">✅ [OK] ${item.canal}</div>`;
                } else {
                    registrarErro(item, `Erro ${res.status}`, dominio);
                }
            } catch (err) {
                registrarErro(item, "Bloqueado/CORS", dominio);
            }
        }

        // Exibe o Resumo Final
        let htmlResumo = `<div class="count-box">Total OK: ${contagem.ok}</div>
                          <div class="count-box" style="color:red">Total Erro: ${contagem.erro}</div><br><br>
                          <strong>Erros por Domínio:</strong><ul>`;
        for (const dom in contagem.dominiosErro) {
            htmlResumo += `<li>${dom}: ${contagem.dominiosErro[dom]} erros</li>`;
        }
        resumoDiv.innerHTML = htmlResumo + "</ul>";

    } catch (e) {
        resumoDiv.innerHTML = `<span style="color:red">Erro ao carregar JSON: ${e.message}</span>`;
    }

    function registrarErro(item, msg, dominio) {
        contagem.erro++;
        contagem.dominiosErro[dominio] = (contagem.dominiosErro[dominio] || 0) + 1;
        listaErros.innerHTML += `<div class="erro">❌ [${msg}] ${item.canal} (${dominio})</div>`;
    }
}

rodarAuditoria();
</script>
</body>
</html>
