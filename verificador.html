<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Auditoria e Substituição de Canais</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .config-area { background: #fff3cd; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        .erro { color: #d32f2f; margin: 3px 0; }
        .ok { color: #388e3c; margin: 3px 0; }
    </style>
</head>
<body>

<div class="box">
    <h1>Auditoria e Teste de Substituição</h1>
    
    <div class="config-area">
        <h3>Testar Substituição de Domínio</h3>
        <label>Domínio com Erro:</label>
        <select id="selectErro"></select>
        <label>Substituir pelo Domínio OK:</label>
        <select id="selectOk"></select>
        <button onclick="aplicarSimulacao()">Simular Substituição</button>
    </div>

    <div id="resumo"></div>
    <div id="listaResultados"></div>
</div>

<script>
let canaisGlobais = [];
let dominiosErrados = new Set();
let dominiosOk = new Set();

async function rodarAuditoria() {
    const resposta = await fetch('imagens.json');
    canaisGlobais = await resposta.json();

    for (const item of canaisGlobais) {
        const urlFinal = item.qualidade === 'hd' ? item.logo + '/file.txt' : item.logo + '.m3u8';
        const dominio = new URL(item.logo).hostname;

        try {
            const res = await fetch(urlFinal, { method: 'HEAD', mode: 'cors' });
            if (res.ok) {
                dominiosOk.add(dominio);
            } else {
                dominiosErrados.add(dominio);
            }
        } catch (err) {
            dominiosErrados.add(dominio);
        }
    }
    popularSelects();
}

function popularSelects() {
    const sErro = document.getElementById('selectErro');
    const sOk = document.getElementById('selectOk');
    dominiosErrados.forEach(d => sErro.innerHTML += `<option value="${d}">${d}</option>`);
    dominiosOk.forEach(d => sOk.innerHTML += `<option value="${d}">${d}</option>`);
}

function aplicarSimulacao() {
    const de = document.getElementById('selectErro').value;
    const para = document.getElementById('selectOk').value;
    const lista = document.getElementById('listaResultados');
    lista.innerHTML = "<h3>Simulação de Links Substituídos:</h3>";

    canaisGlobais.forEach(item => {
        if (new URL(item.logo).hostname === de) {
            const novaLogo = item.logo.replace(de, para);
            lista.innerHTML += `<div class="ok">✅ <b>${item.canal}</b><br>Novo Link: ${novaLogo}</div>`;
        }
    });
}

rodarAuditoria();
</script>
</body>
</html>
