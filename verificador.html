<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Verificador de Canais via JSON</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .ok { color: green; font-weight: bold; }
        .erro { color: red; font-weight: bold; }
        table { border-collapse: collapse; width: 100%; }
        td, th { border: 1px solid #ccc; padding: 8px; text-align: left; }
    </style>
</head>
<body>

<h1>Status dos Canais (Carregado de imagens.json)</h1>
<table id="tabela">
    <tr><th>Canal</th><th>Qualidade</th><th>URL Final</th><th>Status</th></tr>
</table>

<script>
async function carregarEVerificar() {
    try {
        // Busca o arquivo JSON na mesma pasta
        const resposta = await fetch('imagens.json');
        const canais = await resposta.json();
        
        const tabela = document.getElementById('tabela');

        canais.forEach(item => {
            // Regra: /file.txt para hd, .m3u8 para sd
            const urlFinal = item.qualidade === 'hd' ? item.logo + '/file.txt' : item.logo + '.m3u8';
            
            const row = tabela.insertRow();
            row.insertCell(0).innerText = item.canal;
            row.insertCell(1).innerText = item.qualidade;
            row.insertCell(2).innerText = urlFinal;
            const cellStatus = row.insertCell(3);
            cellStatus.innerText = "Verificando...";

            // Verificação via HEAD request
            fetch(urlFinal, { method: 'HEAD', mode: 'no-cors' })
                .then(() => {
                    cellStatus.innerHTML = '<span class="ok">OK</span>';
                })
                .catch(() => {
                    cellStatus.innerHTML = '<span class="erro">Erro</span>';
                });
        });
    } catch (e) {
        document.body.innerHTML += '<p style="color:red">Erro: Não foi possível carregar o arquivo imagens.json. Certifique-se de estar rodando em um servidor local.</p>';
    }
}

carregarEVerificar();
</script>
</body>
</html>
