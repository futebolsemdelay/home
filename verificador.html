<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Verificador de Canais - Auditoria</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f4f4f9; }
        .erro-box { background: #fee; border: 2px solid #f00; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        .erro-item { color: #d00; margin: 5px 0; font-weight: bold; }
        table { border-collapse: collapse; width: 100%; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #333; color: #fff; }
        .status-ok { color: green; }
        .status-erro { color: red; }
    </style>
</head>
<body>

    <h1>Auditoria de Canais</h1>
    <div id="relatorioErros" class="erro-box">
        <h3>🚨 Canais Inacessíveis:</h3>
        <div id="listaErros">Nenhum erro encontrado até o momento...</div>
    </div>

    <table id="tabelaCanais">
        <thead>
            <tr>
                <th>Canal</th>
                <th>Qualidade</th>
                <th>URL Final</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

<script>
async function iniciarVerificacao() {
    const tabelaBody = document.querySelector("#tabelaCanais tbody");
    const listaErros = document.querySelector("#listaErros");
    let encontrouErro = false;

    try {
        const resposta = await fetch('imagens.json');
        const canais = await resposta.json();

        canais.forEach(item => {
            const urlFinal = item.qualidade === 'hd' ? item.logo + '/file.txt' : item.logo + '.m3u8';
            
            // Adiciona na tabela
            const row = tabelaBody.insertRow();
            row.innerHTML = `<td>${item.canal}</td><td>${item.qualidade}</td><td>${urlFinal}</td><td class="status">Testando...</td>`;
            const statusCell = row.querySelector('.status');

            // Testa a URL
            fetch(urlFinal, { method: 'HEAD', mode: 'no-cors' })
                .then(() => {
                    statusCell.innerText = "OK";
                    statusCell.className = "status-ok";
                })
                .catch(() => {
                    statusCell.innerText = "FORA DO AR";
                    statusCell.className = "status-erro";
                    
                    // Adiciona ao relatório de erros
                    if (!encontrouErro) { listaErros.innerHTML = ""; encontrouErro = true; }
                    const divErro = document.createElement('div');
                    divErro.className = "erro-item";
                    divErro.innerHTML = `❌ ${item.canal} (${item.qualidade}) - <a href="${urlFinal}" target="_blank">Abrir link</a>`;
                    listaErros.appendChild(divErro);
                });
        });
    } catch (err) {
        listaErros.innerHTML = "Erro ao carregar o arquivo JSON. Certifique-se de usar um servidor local (Live Server).";
    }
}

iniciarVerificacao();
</script>
</body>
</html>
